name = "alyaf-alshamal-api"
main = "src/index.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# No public *.workers.dev URL. The worker is reached ONLY through the `API`
# service binding from the two Pages projects (public site + dashboard).
# This keeps the admin namespace unreachable from the open internet, so a
# forged Cf-Access-* header can never hit it directly.
workers_dev = false

# D1 binding — create the database first:
#   wrangler d1 create alyaf-alshamal
#   (copy the database_id below)
[[d1_databases]]
binding       = "DB"
database_name = "alyaf-alshamal"
database_id   = "4f5e819a-6049-4c1a-afd8-a22c4d4d0396"

# Secrets (set with `wrangler secret put <NAME>`, never commit them):
#   ADMIN_PASSWORD_HASH      — base64(SHA-256(owner_password)). REQUIRED for
#                              dashboard login. Generate with:
#                                node -e "const c=require('crypto');console.log(c.createHash('sha256').update(process.argv[1]).digest('base64'))" 'your-password'
#                              (see HANDOVER.md §7 for full steps)
#   SESSION_SECRET           — 32+ random bytes (any string). REQUIRED for
#                              signing session tokens. Generate with:
#                                node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"
#   RESEND_API_KEY           — lead-notification email (Resend). Optional;
#                              without it, email degrades to a silent no-op.
#   PUBLIC_DEPLOY_HOOK_URL   — Cloudflare Pages deploy hook. The worker POSTs
#                              it after each catalog/settings edit to rebuild
#                              the public site. Optional.
#   MAIL_FROM (optional)     — verified Resend "from" address.
# R2 bucket for image storage (image management feature).
# ONE-TIME SETUP (see HANDOVER.md §11):
#   npx wrangler r2 bucket create alyaf-alshamal-images
# Then UNCOMMENT the block below and redeploy the worker.
# The worker degrades safely without this binding: image upload returns
# a clear error, image list/edit/link still work (D1 only), and the
# public /api/images/<id> endpoint returns 404.
#
# [[r2_buckets]]
# binding       = "IMAGES"
# bucket_name   = "alyaf-alshamal-images"

[vars]
ADMIN_ORIGIN = "https://alyaf-alshamal-admin.pages.dev"

# Auth: internal password login (replaces Cloudflare Access). The worker
# verifies an HMAC-SHA256 session token on every /api/admin/* request
# (except /login and /logout). See HANDOVER.md §7 for setup.
# public/_worker.js still hard-blocks /api/admin/* from the public origin.
